name: quantmodel-ci

on:
  push:
    paths:
      - "quantmodel/**"
  pull_request:
    paths:
      - "quantmodel/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: quantmodel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Unit + integration tests
        run: pytest -q
      - name: Demo smoke
        run: python run_demo.py --config configs/demo_synthetic.yaml
