run:
  name: donchian_base
  seed: 42
  initial_equity: 1000000
  timezone: America/New_York
  base_currency: USD

data:
  vendor: lse_cache
  # Monorepo-relative path; resolved from package or cwd
  cache_root: ../data_cache
  lse_interval: 1d
  start_date: "2020-01-01"
  end_date: null
  benchmark: SPY
  use_delisted: false
  min_history_days: 252
  survivorship_bias: true
  adjustment_convention: "vendor_single_series_as_adjusted"

universe:
  exchanges:
    - NYSE
    - NASDAQ
    - AMEX
  security_types:
    - common_stock
  min_price: 5.0
  min_median_dollar_volume_20d: 1000000
  max_position_fraction_of_adv: 0.01
  exclude_otc: true
  exclude_etfs: false
  exclude_adrs: false

signal:
  entry_lookback: 55
  exit_lookback: 20
  trend_sma_days: 200
  benchmark_regime_filter: true
  volume_lookback: 50
  volume_multiple: 1.5
  breakout_uses_close: true
  max_holding_days: null

risk:
  atr_days: 20
  atr_multiple: 2.0
  risk_per_trade: 0.005
  max_portfolio_heat: 0.04
  max_positions: 20
  max_position_weight: 0.10
  max_sector_weight: 0.30
  kill_switch_drawdown: -0.12
  resume_drawdown: -0.08
  allow_new_entries_during_kill_switch: false

execution:
  signal_to_fill: next_open
  slippage_bps: 5
  commission_per_share: 0.005
  minimum_commission: 1.0
  allow_fractional_shares: false
  intraday_stop_policy: stop_price
  gap_stop_policy: fill_at_open
  volume_participation_limit: 0.01
  capacity_slippage:
    enabled: false
    b0: 5.0
    b1: 10.0
    b2: 0.0

earnings:
  enabled: false
  entry_blackout_days_before: 7
  entry_blackout_days_after: 1
  force_exit_before_earnings: false

ranking:
  mode: simple
  # simple: breakout strength, volume multiple, liquidity, security_id

validation:
  walkforward:
    scheme: anchored
    initial_train_years: 2
    test_years: 1
    step_years: 1
  bootstrap:
    method: stationary
    samples: 1000
    seed: 42
  promotion:
    minimum_oos_sharpe: 0.7
    minimum_oos_to_is_ratio: 0.60
    minimum_deflated_sharpe_probability: 0.95
    minimum_bootstrap_sharpe_lower_bound: 0.0
    require_survivorship_free_data: true
    require_stress_era_history: true

artifacts:
  root: artifacts/runs
