name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests (Python 3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      MLFLOW_DISABLE: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONHASHSEED: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-ci.txt
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-ci.txt
      - name: Run backend suite
        run: python -m pytest

  frontend:
    name: Frontend tests and typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/trade-desk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/trade-desk/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Run frontend tests
        run: npm test
      - name: Typecheck frontend
        run: npm run typecheck

  container:
    name: Container build and smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Build production image
        run: docker build --tag tradingalgo-market-runtime:ci .
      - name: Verify unprivileged runtime and health endpoint
        run: |
          test "$(docker image inspect tradingalgo-market-runtime:ci --format '{{.Config.User}}')" = "runtime"
          docker run --rm --detach --name market-runtime-ci --publish 8000:8000 --env MARKET_RUNTIME_API_TOKEN=ci-smoke-token tradingalgo-market-runtime:ci
          trap 'docker stop market-runtime-ci >/dev/null 2>&1 || true' EXIT
          for attempt in $(seq 1 20); do
            if curl --fail --silent --show-error http://127.0.0.1:8000/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker logs market-runtime-ci
          exit 1
